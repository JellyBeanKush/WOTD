name: WOTD Bot

on:
  schedule:
    - cron: '30 14 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install @google/genai

      - name: Run WOTD Script
        run: node generate-daily.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "WOTD Bot"
          git config --global user.email "bot@github.com"
          git add current-word.txt word-history.json
          # Only commit if files actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Daily Word and History [skip ci]" && git push)
