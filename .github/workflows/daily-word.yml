name: WOTD Bot

on:
  schedule:
    - cron: '30 14 * * *' # 7:30 AM PT
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install @google/genai

      - name: Run WOTD Script
        run: node generate-daily.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Commit and Push History
        run: |
          git config --global user.name "WOTD Bot"
          git config --global user.email "bot@github.com"
          git add wotd_history.json current_wotd.txt
          git commit -m "Update WOTD history [skip ci]" || echo "No changes"
          git push
